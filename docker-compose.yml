services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kyc
      POSTGRES_PASSWORD: kyc-dev-password
      POSTGRES_DB: kyc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyc -d kyc"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://kyc:kyc-dev-password@db:5432/kyc
      KYC_AUTH_SECRET: dev-secret-CHANGE-ME-IN-PROD
      KYC_AUTH_ALGORITHM: HS256
      KYC_AUTH_ACCESS_TOKEN_TTL_MINUTES: "60"
      WORKERS: "2"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
